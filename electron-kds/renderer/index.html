<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowix Station KDS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111827; height: 100vh; overflow: hidden; color: white; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: linear-gradient(135deg, #1f2937, #111827);
    }
    .login-card {
      background: #1f2937; border-radius: 20px; padding: 40px;
      width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #374151;
    }
    .login-logo {
      width: 72px; height: 72px; border-radius: 18px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 16px;
    }
    .login-title { text-align: center; font-size: 24px; font-weight: 800; color: white; margin-bottom: 6px; }
    .login-sub { text-align: center; font-size: 14px; color: #9ca3af; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #d1d5db; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 13px 16px; font-size: 15px;
      border: 2px solid #374151; border-radius: 10px;
      background: #111827; color: white; outline: none; transition: all 0.2s;
    }
    .form-group input:focus { border-color: #f59e0b; }
    .btn-login {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }
    .login-error {
      background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
      border-radius: 10px; padding: 12px 14px; font-size: 14px;
      margin-bottom: 14px; display: none;
    }

    /* KDS */
    #kds-screen { display: none; flex-direction: column; height: 100vh; }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: #1f2937; padding: 12px 20px; border-bottom: 1px solid #374151;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-logo { font-size: 22px; }
    .topbar-nom { font-size: 16px; font-weight: 700; }
    .topbar-station { font-size: 13px; color: #9ca3af; }
    .topbar-clock { font-size: 20px; font-weight: 700; color: #f59e0b; font-variant-numeric: tabular-nums; }
    .btn-logout-kds {
      background: #374151; color: #d1d5db; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* Filtres stations */
    .filtres-bar {
      display: flex; gap: 8px; padding: 12px 16px; background: #1f2937;
      border-bottom: 1px solid #374151; flex-shrink: 0; overflow-x: auto;
    }
    .filtre-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid #374151;
      background: #374151; color: #d1d5db; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .filtre-btn.actif { background: #f59e0b; border-color: #f59e0b; color: #111827; }
    .filtre-btn:hover:not(.actif) { background: #4b5563; }
    .badge-count {
      display: inline-block; background: rgba(0,0,0,0.3); border-radius: 10px;
      padding: 1px 6px; font-size: 11px; margin-left: 4px;
    }

    /* Grille commandes */
    .commandes-grid {
      flex: 1; overflow-y: auto; padding: 16px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; align-content: start;
    }

    /* Carte commande */
    .cmd-card {
      background: #1f2937; border-radius: 14px; overflow: hidden;
      border: 2px solid #374151; display: flex; flex-direction: column;
    }
    .cmd-card.statut-ouverte  { border-color: #3b82f6; }
    .cmd-card.statut-en_cours { border-color: #f59e0b; }
    .cmd-card.statut-prete    { border-color: #22c55e; }

    .cmd-header {
      padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .cmd-header.statut-ouverte  { background: #1e3a5f; }
    .cmd-header.statut-en_cours { background: #78350f; }
    .cmd-header.statut-prete    { background: #14532d; }

    .cmd-table { font-size: 18px; font-weight: 800; }
    .cmd-id    { font-size: 12px; color: rgba(255,255,255,0.6); }
    .cmd-timer {
      font-size: 13px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; background: rgba(0,0,0,0.3);
    }
    .cmd-timer.urgent { color: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .cmd-serveur {
      padding: 6px 14px; font-size: 12px; color: #9ca3af;
      border-bottom: 1px solid #374151;
    }

    .cmd-body { padding: 12px 14px; flex: 1; }
    .cmd-temps-attente {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      font-size: 12px; color: #9ca3af;
    }
    .cmd-prep-badge {
      background: #1d4ed8; color: white; border-radius: 6px;
      padding: 2px 8px; font-size: 12px; font-weight: 600;
    }

    .cmd-ligne {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #374151; font-size: 14px;
    }
    .cmd-ligne:last-child { border-bottom: none; }
    .ligne-nom { font-weight: 600; color: #f3f4f6; }
    .ligne-station {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px;
      margin-left: 6px;
    }
    .ligne-qty {
      background: #374151; color: white; border-radius: 6px;
      padding: 3px 10px; font-weight: 700; font-size: 13px; min-width: 32px; text-align: center;
    }

    /* Prep time input */
    .cmd-prep-section {
      padding: 8px 14px; border-top: 1px solid #374151;
      display: flex; gap: 8px; align-items: center;
    }
    .prep-input {
      width: 64px; padding: 6px 8px; background: #111827; border: 1px solid #374151;
      border-radius: 8px; color: white; font-size: 13px; outline: none; text-align: center;
    }
    .prep-input:focus { border-color: #f59e0b; }
    .btn-prep {
      padding: 6px 12px; background: #f59e0b; color: #111827;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .prep-label { font-size: 12px; color: #9ca3af; }

    /* Boutons action */
    .cmd-actions {
      padding: 10px 14px; border-top: 1px solid #374151;
      display: flex; gap: 8px;
    }
    .btn-action {
      flex: 1; padding: 10px 6px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .btn-en-cours { background: #f59e0b; color: #111827; }
    .btn-prete    { background: #22c55e; color: #111827; }
    .btn-en-cours:hover { background: #d97706; }
    .btn-prete:hover    { background: #16a34a; }
    .btn-action:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    /* Vide */
    .kds-vide {
      grid-column: 1/-1; text-align: center; padding: 80px 20px;
      color: #4b5563; font-size: 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🍳</div>
    <div class="login-title">Flowix Station KDS</div>
    <div class="login-sub">Écran d'affichage cuisine / bar</div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="votre@email.com" />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="input-password" placeholder="••••••••" />
    </div>
    <button class="btn-login" id="btn-login">🍳 Démarrer la station</button>
  </div>
</div>

<!-- KDS -->
<div id="kds-screen">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🍳</span>
      <div>
        <div class="topbar-nom" id="topbar-nom">Flowix KDS</div>
        <div class="topbar-station" id="topbar-station">Toutes les stations</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="topbar-clock" id="topbar-clock">00:00</div>
      <button class="btn-logout-kds" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- Filtres -->
  <div class="filtres-bar" id="filtres-bar">
    <button class="filtre-btn actif" data-station="" onclick="filtrerStation(this, '')">
      📋 Toutes <span class="badge-count" id="badge-all">0</span>
    </button>
  </div>

  <!-- Grille -->
  <div class="commandes-grid" id="commandes-grid">
    <div class="kds-vide">Connexion...</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const API_URL = 'https://maquisflow.com'

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state = {
  token:      null,
  utilisateur: null,
  commandes:  [],
  stations:   [],
  stationFiltree: '',
  timers:     {}
}
let pollInterval = null
let clockInterval = null

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  const token = await window.electronAPI.storeGet('kds_token')
  const user  = await window.electronAPI.storeGet('kds_user')
  const stSaved = await window.electronAPI.storeGet('kds_station') || ''

  document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login()
  })

  if (token && user) {
    state.token = token
    state.utilisateur = user
    state.stationFiltree = stSaved
    await afficherKDS()
  }
})

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
document.getElementById('btn-login').addEventListener('click', login)

async function login() {
  const email = document.getElementById('input-email').value
  const mdp   = document.getElementById('input-password').value
  if (!email || !mdp) { showLoginError('Email et mot de passe requis'); return }

  document.getElementById('btn-login').textContent = 'Connexion...'
  try {
    const res  = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, mot_de_passe: mdp }),
      credentials: 'include'
    })
    const data = await res.json()
    if (!data.success) throw new Error(data.message)
    if (data.selection_requise) throw new Error('Multi-établissements non supporté ici.')

    state.token = data.data.accessToken
    state.utilisateur = data.data.utilisateur
    await window.electronAPI.storeSet('kds_token', state.token)
    await window.electronAPI.storeSet('kds_user', state.utilisateur)
    await afficherKDS()
  } catch (e) {
    showLoginError(e.message || 'Erreur de connexion')
  } finally {
    document.getElementById('btn-login').textContent = '🍳 Démarrer la station'
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error')
  el.textContent = '⚠️ ' + msg
  el.style.display = 'block'
}

async function logout() {
  if (pollInterval)  { clearInterval(pollInterval);  pollInterval  = null }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null }
  await window.electronAPI.storeDelete('kds_token')
  await window.electronAPI.storeDelete('kds_user')
  state.token = null; state.utilisateur = null; state.commandes = []
  document.getElementById('login-screen').style.display = 'flex'
  document.getElementById('kds-screen').style.display   = 'none'
  document.getElementById('input-password').value = ''
}

// ═══════════════════════════════════════════════════
// AFFICHAGE PRINCIPAL
// ═══════════════════════════════════════════════════
async function afficherKDS() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('kds-screen').style.display   = 'flex'

  const u = state.utilisateur
  document.getElementById('topbar-nom').textContent = u?.maquis?.nom || 'Flowix KDS'

  await chargerStations()
  await chargerCommandes()

  pollInterval  = setInterval(chargerCommandes, 10000)
  clockInterval = setInterval(majHeure, 1000)
  majHeure()
}

// ═══════════════════════════════════════════════════
// HORLOGE
// ═══════════════════════════════════════════════════
function majHeure() {
  const now = new Date()
  document.getElementById('topbar-clock').textContent =
    now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
}

// ═══════════════════════════════════════════════════
// STATIONS
// ═══════════════════════════════════════════════════
async function chargerStations() {
  try {
    const res  = await fetch(`${API_URL}/api/commandes/stations`, {
      headers: { Authorization: `Bearer ${state.token}` }
    })
    const data = await res.json()
    state.stations = data.data || []
    renderFiltres()
  } catch (e) { console.log('Erreur stations:', e) }
}

function renderFiltres() {
  const bar  = document.getElementById('filtres-bar')
  const actif = state.stationFiltree

  const toutesBtn = `<button class="filtre-btn ${actif === '' ? 'actif' : ''}" data-station="" onclick="filtrerStation(this, '')">
    📋 Toutes <span class="badge-count" id="badge-all">0</span>
  </button>`

  const stationsBtns = state.stations.map(s => `
    <button class="filtre-btn ${actif === String(s.id) ? 'actif' : ''}"
      data-station="${s.id}"
      onclick="filtrerStation(this, '${s.id}')"
      style="${actif === String(s.id) ? `background:${s.couleur || '#f59e0b'};border-color:${s.couleur || '#f59e0b'};color:#111827` : ''}">
      ${s.nom}
      <span class="badge-count" id="badge-s${s.id}">0</span>
    </button>
  `).join('')

  bar.innerHTML = toutesBtn + stationsBtns
  updateBadges()
  majLabelStation()
}

function filtrerStation(btn, stationId) {
  state.stationFiltree = stationId
  window.electronAPI.storeSet('kds_station', stationId)

  document.querySelectorAll('.filtre-btn').forEach(b => {
    b.classList.remove('actif')
    b.removeAttribute('style')
  })
  btn.classList.add('actif')
  const st = state.stations.find(s => String(s.id) === stationId)
  if (st) btn.style.cssText = `background:${st.couleur || '#f59e0b'};border-color:${st.couleur || '#f59e0b'};color:#111827`

  majLabelStation()
  renderCommandes()
}

function majLabelStation() {
  const st = state.stations.find(s => String(s.id) === state.stationFiltree)
  document.getElementById('topbar-station').textContent = st ? `Station : ${st.nom}` : 'Toutes les stations'
}

function updateBadges() {
  // badge "Toutes"
  const total = state.commandes.filter(c => ['ouverte', 'en_cours'].includes(c.statut)).length
  const badgeAll = document.getElementById('badge-all')
  if (badgeAll) badgeAll.textContent = total

  state.stations.forEach(s => {
    const n = state.commandes.filter(c =>
      ['ouverte', 'en_cours'].includes(c.statut) &&
      c.lignes?.some(l => l.station_id === s.id)
    ).length
    const el = document.getElementById(`badge-s${s.id}`)
    if (el) el.textContent = n
  })
}

// ═══════════════════════════════════════════════════
// COMMANDES
// ═══════════════════════════════════════════════════
async function chargerCommandes() {
  try {
    const statuts = ['ouverte', 'en_cours', 'prete']
    const results = await Promise.all(
      statuts.map(st =>
        fetch(`${API_URL}/api/commandes?statut=${st}${state.stationFiltree ? `&station_id=${state.stationFiltree}` : ''}`, {
          headers: { Authorization: `Bearer ${state.token}` }
        }).then(r => r.json())
      )
    )
    state.commandes = results.flatMap(d => d.data || [])
    updateBadges()
    renderCommandes()
  } catch (e) { console.log('Erreur commandes:', e) }
}

function renderCommandes() {
  const grid = document.getElementById('commandes-grid')

  let filtrees = state.commandes.filter(c => ['ouverte', 'en_cours', 'prete'].includes(c.statut))

  if (state.stationFiltree) {
    filtrees = filtrees.filter(c =>
      c.lignes?.some(l => String(l.station_id) === state.stationFiltree)
    )
  }

  // Trier : en_cours en premier, puis ouverte, puis prete
  const ordre = { en_cours: 0, ouverte: 1, prete: 2 }
  filtrees.sort((a, b) => (ordre[a.statut] ?? 3) - (ordre[b.statut] ?? 3))

  if (!filtrees.length) {
    grid.innerHTML = '<div class="kds-vide">✅ Aucune commande en attente</div>'
    return
  }

  grid.innerHTML = filtrees.map(cmd => renderCard(cmd)).join('')
}

function renderCard(cmd) {
  const minutesAttente = cmd.created_at
    ? Math.floor((Date.now() - new Date(cmd.created_at)) / 60000)
    : 0
  const urgent = minutesAttente >= 15
  const timerText = `${minutesAttente}min`

  const lignesHtml = (cmd.lignes || [])
    .filter(l => !state.stationFiltree || String(l.station_id) === state.stationFiltree)
    .map(l => {
      const st = state.stations.find(s => s.id === l.station_id)
      const stBadge = st
        ? `<span class="ligne-station" style="background:${st.couleur || '#374151'};color:white">${st.nom}</span>`
        : ''
      return `
        <div class="cmd-ligne">
          <span class="ligne-nom">${l.produit?.nom || 'Produit'}${stBadge}</span>
          <span class="ligne-qty">×${l.quantite}</span>
        </div>`
    }).join('')

  const prepBadge = cmd.temps_preparation
    ? `<span class="cmd-prep-badge">⏱️ ~${cmd.temps_preparation} min</span>`
    : ''

  const btnEnCours = cmd.statut === 'ouverte'
    ? `<button class="btn-action btn-en-cours" onclick="changerStatut(${cmd.id},'en_cours')">🔥 En cours</button>`
    : `<button class="btn-action btn-en-cours" disabled>🔥 En cours</button>`

  const btnPrete = cmd.statut !== 'prete'
    ? `<button class="btn-action btn-prete" onclick="changerStatut(${cmd.id},'prete')">✅ Prête</button>`
    : `<button class="btn-action btn-prete" disabled>✅ Prête</button>`

  return `
    <div class="cmd-card statut-${cmd.statut}" id="card-${cmd.id}">
      <div class="cmd-header statut-${cmd.statut}">
        <div>
          <div class="cmd-table">Table ${cmd.table?.numero || '?'}</div>
          <div class="cmd-id">#${cmd.id}</div>
        </div>
        <div class="cmd-timer ${urgent ? 'urgent' : ''}">${timerText}</div>
      </div>
      <div class="cmd-serveur">👤 ${cmd.serveur?.nom || 'Serveur'}</div>
      <div class="cmd-body">
        ${prepBadge ? `<div class="cmd-temps-attente">${prepBadge}</div>` : ''}
        ${lignesHtml}
      </div>
      <div class="cmd-prep-section">
        <span class="prep-label">⏱️</span>
        <input class="prep-input" type="number" min="1" max="120" placeholder="min"
          id="prep-${cmd.id}" value="${cmd.temps_preparation || ''}" />
        <button class="btn-prep" onclick="definirTemps(${cmd.id})">OK</button>
      </div>
      <div class="cmd-actions">
        ${btnEnCours}
        ${btnPrete}
      </div>
    </div>`
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
async function changerStatut(cmdId, statut) {
  try {
    const res  = await fetch(`${API_URL}/api/commandes/${cmdId}/statut`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
      body: JSON.stringify({ statut })
    })
    const data = await res.json()
    if (!data.success) return
    const idx = state.commandes.findIndex(c => c.id === cmdId)
    if (idx !== -1) { state.commandes[idx] = data.data }
    updateBadges()
    renderCommandes()
  } catch (e) { console.log('Erreur statut:', e) }
}

async function definirTemps(cmdId) {
  const input = document.getElementById(`prep-${cmdId}`)
  const minutes = parseInt(input?.value)
  if (!minutes || minutes < 1) return
  try {
    const res  = await fetch(`${API_URL}/api/commandes/${cmdId}/temps`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${state.token}` },
      body: JSON.stringify({ minutes })
    })
    const data = await res.json()
    if (!data.success) return
    const idx = state.commandes.findIndex(c => c.id === cmdId)
    if (idx !== -1) { state.commandes[idx] = data.data }
    renderCommandes()
  } catch (e) { console.log('Erreur temps:', e) }
}
</script>
</body>
</html>
